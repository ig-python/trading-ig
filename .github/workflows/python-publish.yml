name: Upload Python Package

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  deploy:

    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install uv and Python
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.6"
        python-version: "3.10"

    - name: Build
      run: uv build

    - name: Publish
      run: uv publish
